name: Deploy Production

on:
    push:
        branches: [main]

concurrency:
    group: deploy-prod
    cancel-in-progress: false

jobs:
    deploy:
        name: deploy-prod
        runs-on: [self-hosted, smolla-identity-provider]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GHCR
              run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build image
              run: |
                  docker build \
                      --tag ghcr.io/adamsalisbury/smolla-identity-provider:latest \
                      --tag ghcr.io/adamsalisbury/smolla-identity-provider:${{ github.sha }} \
                      .

            - name: Push image
              run: |
                  docker push ghcr.io/adamsalisbury/smolla-identity-provider:latest
                  docker push ghcr.io/adamsalisbury/smolla-identity-provider:${{ github.sha }}

            - name: Deploy
              run: ./deploy.sh prod
