name: Deploy Staging

on:
    push:
        branches: [develop]

concurrency:
    group: deploy-staging
    cancel-in-progress: false

jobs:
    deploy:
        name: deploy-staging
        runs-on: [self-hosted, smolla-identity-provider]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GHCR
              run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build image
              run: |
                  docker build \
                      --tag ghcr.io/adamsalisbury/smolla-identity-provider:staging \
                      --tag ghcr.io/adamsalisbury/smolla-identity-provider:staging-${{ github.sha }} \
                      .

            - name: Push image
              run: |
                  docker push ghcr.io/adamsalisbury/smolla-identity-provider:staging
                  docker push ghcr.io/adamsalisbury/smolla-identity-provider:staging-${{ github.sha }}

            - name: Deploy
              run: ./deploy.sh staging
