name: Deploy to Test

# Manual-only — triggered from the Actions tab (or `gh workflow run`) against
# any branch (typically a `feature/*` or `hotfix/*`). Single-tenant test slot
# (`test-identity.smol.la`, port 10003, db `smolla-identity-test`). Whoever
# ships last owns it; coordinate with whoever else is reviewing on test.

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to build and deploy (e.g. feature/foo, hotfix/bar)'
                required: true
                type: string

concurrency:
    group: deploy-test
    cancel-in-progress: false

jobs:
    deploy:
        name: deploy-test
        runs-on: [self-hosted, smolla-identity-provider]

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.branch }}

            - name: Log in to GHCR
              run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            - name: Build image
              run: |
                  docker build \
                      --tag ghcr.io/adamsalisbury/smolla-identity-provider:test \
                      --tag ghcr.io/adamsalisbury/smolla-identity-provider:test-${{ github.sha }} \
                      .

            - name: Push image
              run: |
                  docker push ghcr.io/adamsalisbury/smolla-identity-provider:test
                  docker push ghcr.io/adamsalisbury/smolla-identity-provider:test-${{ github.sha }}

            - name: Deploy
              run: ./deploy.sh test
