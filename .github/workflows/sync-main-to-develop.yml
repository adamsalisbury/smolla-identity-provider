name: Sync main into develop

on:
    push:
        branches: [main]

concurrency:
    group: sync-main-to-develop
    cancel-in-progress: false

jobs:
    open-sync-pr:
        name: open-sync-pr
        runs-on: [self-hosted, smolla-identity-provider]
        permissions:
            contents: read
            pull-requests: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Determine sync need
              id: diff
              run: |
                  git fetch --no-tags origin develop main
                  if git log --oneline origin/develop..origin/main | grep -q .; then
                      echo "has-changes=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "has-changes=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Open or update sync PR
              if: steps.diff.outputs.has-changes == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  existing=$(gh pr list --base develop --head main --state open --json number --jq '.[0].number // empty')
                  if [[ -z "$existing" ]]; then
                      gh pr create \
                          --base develop \
                          --head main \
                          --title "chore: sync main into develop" \
                          --body "Automatically opened after a push to \`main\` (typically a hotfix). Merging this PR brings the prod-shipped change(s) back into \`develop\` so the next staging deploy is not a regression. See RUNBOOK.md."
                  else
                      echo "Sync PR already open: #$existing"
                  fi
